<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>term1nate</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      -webkit-app-region: no-drag;
    }

    /* Title bar area - draggable */
    .titlebar {
      -webkit-app-region: drag;
      padding: 16px 20px 8px 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .titlebar h1 {
      font-size: 20px;
      font-weight: 700;
      color: #ff6b6b;
      letter-spacing: -0.5px;
    }

    .titlebar h1 span {
      color: #4a4a6a;
    }

    .titlebar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .process-count {
      font-size: 13px;
      color: #6a6a8a;
    }

    .process-count strong {
      color: #ff6b6b;
      font-weight: 600;
    }

    /* Toolbar */
    .toolbar {
      padding: 8px 20px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box {
      flex: 1;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #16162b;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus {
      border-color: #ff6b6b;
    }

    .search-box::placeholder {
      color: #4a4a6a;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-kill-all {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .btn-kill-all:hover {
      background: rgba(255, 107, 107, 0.25);
    }

    .btn-refresh {
      background: rgba(100, 200, 255, 0.1);
      color: #64c8ff;
      border: 1px solid rgba(100, 200, 255, 0.2);
    }

    .btn-refresh:hover {
      background: rgba(100, 200, 255, 0.2);
    }

    .btn-refresh.spinning svg {
      animation: spin 0.6s linear;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Table */
    .table-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
    }

    .table-container::-webkit-scrollbar {
      width: 6px;
    }

    .table-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .table-container::-webkit-scrollbar-thumb {
      background: #2a2a4a;
      border-radius: 3px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead th {
      padding: 10px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6a6a8a;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }

    tbody tr {
      transition: background 0.1s;
      cursor: default;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tbody td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      white-space: nowrap;
    }

    .col-pid {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: #8a8aaa;
    }

    .col-command {
      font-weight: 500;
      color: #ffffff;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-port {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-weight: 600;
      color: #64c8ff;
    }

    .col-protocol {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .badge-tcp {
      background: rgba(100, 200, 255, 0.15);
      color: #64c8ff;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .badge-udp {
      background: rgba(255, 200, 100, 0.15);
      color: #ffc864;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .col-user {
      color: #8a8aaa;
    }

    .col-address {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 12px;
      color: #6a6a8a;
    }

    .btn-kill {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 107, 107, 0.3);
      background: rgba(255, 107, 107, 0.1);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }

    .btn-kill:hover {
      background: #ff6b6b;
      transform: scale(1.2);
    }

    /* Status bar */
    .statusbar {
      padding: 10px 20px;
      font-size: 12px;
      color: #4a4a6a;
      border-top: 1px solid #2a2a4a;
      display: flex;
      justify-content: space-between;
    }

    .status-msg {
      transition: opacity 0.3s;
    }

    .status-msg.success {
      color: #50fa7b;
    }

    .status-msg.error {
      color: #ff6b6b;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #4a4a6a;
      gap: 8px;
    }

    .empty-state svg {
      opacity: 0.3;
      margin-bottom: 8px;
    }

    /* Confirm dialog */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .confirm-dialog {
      background: #22223a;
      border: 1px solid #3a3a5a;
      border-radius: 14px;
      padding: 28px;
      max-width: 380px;
      text-align: center;
    }

    .confirm-dialog h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #ff6b6b;
    }

    .confirm-dialog p {
      font-size: 13px;
      color: #8a8aaa;
      margin-bottom: 20px;
    }

    .confirm-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-confirm {
      padding: 8px 24px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-confirm-yes {
      background: #ff6b6b;
      color: white;
    }

    .btn-confirm-yes:hover {
      background: #ff5252;
    }

    .btn-confirm-no {
      background: #2a2a4a;
      color: #8a8aaa;
    }

    .btn-confirm-no:hover {
      background: #3a3a5a;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: rgba(80, 250, 123, 0.15);
      color: #50fa7b;
      border: 1px solid rgba(80, 250, 123, 0.3);
    }

    .toast.error {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="titlebar">
      <h1>term1nate</h1>
      <div class="titlebar-right">
        <span class="process-count"><strong id="count">0</strong> processes</span>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-box" id="search" placeholder="Search processes, ports, users...">
      <button class="btn btn-refresh" id="refreshBtn" title="Refresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
        </svg>
      </button>
      <button class="btn btn-kill-all" id="killAllBtn">
        ☢️ Kill All
      </button>
    </div>

    <div class="table-container" id="tableContainer">
      <table>
        <thead>
          <tr>
            <th>PID</th>
            <th>Command</th>
            <th>Port</th>
            <th>Protocol</th>
            <th>User</th>
            <th>Address</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="processTable"></tbody>
      </table>
    </div>

    <div class="statusbar">
      <span class="status-msg" id="statusMsg">Refreshing every 2s</span>
      <span id="lastUpdate"></span>
    </div>
  </div>

  <!-- Single kill confirm dialog -->
  <div class="confirm-overlay" id="killOneDialog" style="display:none">
    <div class="confirm-dialog">
      <h3>Kill Process?</h3>
      <p>You are about to terminate:<br>
        <strong id="killOneName" style="color:#fff"></strong><br>
        <span style="color:#64c8ff" id="killOneDetails"></span>
      </p>
      <p>Are you sure you want to proceed?</p>
      <div class="confirm-buttons">
        <button class="btn-confirm btn-confirm-no" id="killOneNo">Cancel</button>
        <button class="btn-confirm btn-confirm-yes" id="killOneYes">Kill</button>
      </div>
    </div>
  </div>

  <!-- Kill all confirm dialog -->
  <div class="confirm-overlay" id="confirmDialog" style="display:none">
    <div class="confirm-dialog">
      <h3>Kill All Processes?</h3>
      <p>This will terminate <strong id="confirmCount">0</strong> processes. This action cannot be undone.</p>
      <div class="confirm-buttons">
        <button class="btn-confirm btn-confirm-no" id="confirmNo">Cancel</button>
        <button class="btn-confirm btn-confirm-yes" id="confirmYes">Kill All</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
